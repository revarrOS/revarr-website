<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revarr Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950">
  <div id="app" class="min-h-screen">
    <div class="bg-slate-900 border-b border-slate-800">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-blue-500/10 rounded-xl flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400">
                <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>
              </svg>
            </div>
            <div>
              <h1 class="text-2xl font-bold text-white">Admin Dashboard</h1>
              <p class="text-slate-400 text-sm">Manage support conversations</p>
            </div>
          </div>
          <button
            onclick="handleLogout()"
            class="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg transition-colors"
          >
            Logout
          </button>
        </div>
      </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div id="loading" class="flex items-center justify-center py-12">
        <div class="text-white text-xl">Loading conversations...</div>
      </div>

      <div id="content" class="hidden">
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-12 text-center">
          <p class="text-slate-400">Dashboard content will load here</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    function handleLogout() {
      localStorage.removeItem('revarr_admin_session');
      window.location.href = '/admin.html';
    }

    async function checkAuth() {
      const session = localStorage.getItem('revarr_admin_session');
      if (!session) {
        window.location.href = '/admin.html';
        return false;
      }
      return true;
    }

    async function init() {
      const isAuthenticated = await checkAuth();
      if (isAuthenticated) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');
      }
    }

    init();
  </script>
</body>
</html>
